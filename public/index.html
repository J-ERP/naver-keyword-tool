<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>소싱 키워드 관리 도구</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f5f5f3;--surface:#fff;--border:rgba(0,0,0,0.1);--border-md:rgba(0,0,0,0.2);
  --text:#1a1a1a;--text-sec:#666;--text-hint:#aaa;--accent:#1a1a1a;
  --radius:10px;--radius-sm:6px;
  --green-bg:#d1fae5;--green-text:#065f46;--red-bg:#fee2e2;--red-text:#991b1b;
  --yellow-bg:#fef9c3;--yellow-text:#854d0e;--blue-bg:#dbeafe;--blue-text:#1e40af;
  --purple-bg:#ede9fe;--purple-text:#5b21b6;
}
body{font-family:-apple-system,'Pretendard',sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh;}
.layout{display:grid;grid-template-columns:1fr 1fr;gap:1rem;max-width:1280px;margin:0 auto;padding:1.25rem;}
.panel{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:1.25rem;}
.panel-title{font-size:11px;font-weight:600;color:var(--text-sec);letter-spacing:.07em;text-transform:uppercase;margin-bottom:1rem;}
h1{font-size:16px;font-weight:600;margin-bottom:1.25rem;grid-column:1/-1;}
input[type=text],input[type=url],textarea,select{width:100%;height:36px;padding:0 10px;border:0.5px solid var(--border-md);border-radius:var(--radius-sm);font-size:13px;color:var(--text);background:#fafafa;outline:none;font-family:inherit;}
input[type=text]:focus,textarea:focus{border-color:var(--accent);background:#fff;}
textarea{height:auto;padding:8px 10px;resize:vertical;}
.btn{display:inline-flex;align-items:center;justify-content:center;height:34px;padding:0 14px;border:0.5px solid var(--border-md);border-radius:var(--radius-sm);background:#fff;color:var(--text);font-size:12px;cursor:pointer;white-space:nowrap;gap:4px;}
.btn:hover{background:var(--bg);}
.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent);}
.btn.primary:hover{opacity:.85;}
.btn.purple{background:#5b21b6;color:#fff;border-color:#5b21b6;}
.btn.purple:hover{opacity:.85;}
.btn.sm{height:28px;padding:0 10px;font-size:11px;}
.btn.danger{border-color:#fca5a5;color:#991b1b;}
.btn.danger:hover{background:var(--red-bg);}
.row{display:flex;gap:8px;align-items:center;}
.col{display:flex;flex-direction:column;gap:6px;}
.label{font-size:11px;color:var(--text-sec);font-weight:500;}
.mt{margin-top:10px;}.mt2{margin-top:1rem;}
.step{display:flex;align-items:flex-start;gap:10px;margin-bottom:1rem;}
.step-num{width:22px;height:22px;border-radius:50%;background:#ccc;color:#fff;font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.step-num.done{background:#059669;}
.step-num.active{background:#2563eb;}
.step-num.pending{background:#1a1a1a;}
.step-num.expand{background:#5b21b6;}
.step-body{flex:1;}
.step-title{font-size:12px;font-weight:600;margin-bottom:6px;color:var(--text);}
.input-tabs{display:flex;gap:4px;margin-bottom:10px;}
.input-tab{flex:1;height:30px;border:0.5px solid var(--border-md);border-radius:var(--radius-sm);font-size:12px;cursor:pointer;background:#fff;color:var(--text-sec);}
.input-tab.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.upload-area{border:1.5px dashed var(--border-md);border-radius:var(--radius-sm);padding:1.25rem;text-align:center;cursor:pointer;color:var(--text-sec);font-size:13px;}
.upload-area:hover{border-color:var(--accent);}
.upload-area img{max-height:100px;max-width:100%;border-radius:var(--radius-sm);margin-bottom:6px;}
.kw-chip{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:999px;background:var(--blue-bg);color:var(--blue-text);font-size:12px;margin:3px;}
.kw-chip button{background:none;border:none;cursor:pointer;color:var(--blue-text);font-size:14px;line-height:1;padding:0;}
.result-box{background:#fafafa;border:0.5px solid var(--border-md);border-radius:var(--radius-sm);padding:10px 12px;font-size:13px;line-height:1.9;word-break:break-all;min-height:44px;}
.result-box.expand{background:var(--purple-bg);border-color:#c4b5fd;}
.expand-usage{display:inline-flex;align-items:center;font-size:11px;padding:3px 10px;border-radius:999px;background:#5b21b6;color:#fff;margin:2px;border:none;cursor:default;-webkit-appearance:none;appearance:none;}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--text);border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:4px;}
@keyframes spin{to{transform:rotate(360deg)}}
.status{font-size:12px;color:var(--text-sec);padding:6px 0;}
.prod-table{width:100%;border-collapse:collapse;font-size:12px;}
.prod-table th{text-align:left;padding:6px 8px;color:var(--text-sec);border-bottom:0.5px solid var(--border);font-weight:500;font-size:11px;white-space:nowrap;}
.prod-table td{padding:7px 8px;border-bottom:0.5px solid var(--border);vertical-align:top;}
.prod-table tr:last-child td{border-bottom:none;}
.tag{font-size:11px;padding:2px 7px;border-radius:999px;background:var(--blue-bg);color:var(--blue-text);}
.badge-on{font-size:10px;padding:2px 8px;border-radius:999px;background:var(--green-bg);color:var(--green-text);cursor:pointer;}
.badge-off{font-size:10px;padding:2px 8px;border-radius:999px;background:#eee;color:var(--text-hint);cursor:pointer;}
.empty{text-align:center;padding:2rem 0;color:var(--text-hint);font-size:12px;}
.search-item{padding:8px 10px;border-radius:var(--radius-sm);border:0.5px solid var(--border);margin-bottom:6px;cursor:pointer;}
.search-item:hover{background:var(--bg);}
.search-item .name{font-size:13px;font-weight:500;margin-bottom:3px;}
.search-item .tags{font-size:11px;color:var(--text-sec);}
.divider{height:0.5px;background:var(--border);margin:.75rem 0;}
</style>
</head>
<body>
<div class="layout">
  <h1>소싱 키워드 관리 도구</h1>

  <!-- 왼쪽: 6단계 -->
  <div class="panel">
    <div class="panel-title">키워드 자동 추출</div>

    <!-- STEP 1 -->
    <div class="step">
      <div class="step-num pending" id="s1num">1</div>
      <div class="step-body">
        <div class="step-title">상품 이미지 입력</div>
        <div class="input-tabs">
          <button class="input-tab active" onclick="setInputMode('upload')">이미지 업로드</button>
          <button class="input-tab" onclick="setInputMode('url')">URL 입력</button>
        </div>
        <div id="modeUpload">
          <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
            <div id="uploadContent">클릭 또는 드래그해서 이미지 업로드</div>
          </div>
          <input type="file" id="fileInput" accept="image/*" style="display:none;" onchange="onFileSelect(event)"/>
        </div>
        <div id="modeUrl" style="display:none;">
          <div class="row">
            <input type="text" id="urlInput" placeholder="상품 이미지 URL 붙여넣기..."/>
          </div>
          <div id="urlWarn" style="display:none;font-size:11px;color:#92400e;background:var(--yellow-bg);padding:6px 10px;border-radius:var(--radius-sm);margin-top:6px;"></div>
        </div>
        <div class="mt" style="text-align:right;">
          <button class="btn primary" onclick="step1Analyze()" id="btnAnalyze">분석 시작</button>
        </div>
      </div>
    </div>

    <!-- STEP 2 -->
    <div class="step" id="step2" style="display:none;">
      <div class="step-num active" id="s2num">2</div>
      <div class="step-body">
        <div class="step-title">핵심 검색어 확인 및 수정</div>
        <div id="kwChips" style="margin-bottom:8px;"></div>
        <div class="row">
          <input type="text" id="addKwInput" placeholder="키워드 추가..."/>
          <button class="btn sm" onclick="addKw()">추가</button>
        </div>
        <div class="mt" style="text-align:right;">
          <button class="btn primary" onclick="step3Search()">네이버 조회</button>
        </div>
      </div>
    </div>

    <!-- STEP 3 -->
    <div class="step" id="step3" style="display:none;">
      <div class="step-num" id="s3num">3</div>
      <div class="step-body">
        <div class="step-title">네이버 키워드 조회</div>
        <div id="s3status" class="status"></div>
      </div>
    </div>

    <!-- STEP 4 -->
    <div class="step" id="step4" style="display:none;">
      <div class="step-num" id="s4num">4</div>
      <div class="step-body">
        <div class="step-title">Claude 필터링</div>
        <div id="s4status" class="status"></div>
      </div>
    </div>

    <!-- STEP 5 -->
    <div class="step" id="step5" style="display:none;">
      <div class="step-num done" id="s5num">5</div>
      <div class="step-body">
        <div class="step-title">주 용도 태그 완성 <span id="kwFinalCount" style="color:var(--text-hint);font-weight:400;"></span></div>
        <div class="result-box" id="finalResult"></div>
        <div class="row mt" style="justify-content:space-between;">
          <button class="btn sm danger" onclick="resetAll()">처음부터</button>
          <div class="row">
            <button class="btn sm" onclick="copyResult('finalResult')">복사</button>
            <button class="btn sm purple" onclick="step6Expand()">다용도 확장 분석 ▶</button>
          </div>
        </div>
      </div>
    </div>

    <!-- STEP 6 -->
    <div class="step" id="step6" style="display:none;">
      <div class="step-num expand" id="s6num">6</div>
      <div class="step-body">
        <div class="step-title">다용도 확장 분석</div>
        <div id="s6status" class="status"></div>
        <div id="step6Result" style="display:none;">
          <div id="expandUsages" style="display:none;"></div>
          <div class="result-box expand" id="expandResult"></div>
          <div class="row mt" style="justify-content:space-between;">
            <div style="font-size:11px;color:var(--text-sec);">주 용도 + 확장 용도 통합</div>
            <div class="row">
              <button class="btn sm" onclick="copyResult('expandResult')">확장 복사</button>
              <button class="btn sm primary" onclick="applyToForm('expandResult')">상품 등록에 적용 ↓</button>
            </div>
          </div>
          <div class="divider"></div>
          <div style="font-size:11px;color:var(--text-sec);margin-bottom:4px;">주 용도 태그만 적용하려면:</div>
          <button class="btn sm" onclick="applyToForm('finalResult')" style="width:100%;">주 용도만 적용 ↓</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 오른쪽 -->
  <div style="display:flex;flex-direction:column;gap:1rem;">
    <div class="panel">
      <div class="panel-title">이전 상품 검색 (재사용)</div>
      <input type="text" id="searchInput" placeholder="상품명 또는 태그키워드로 검색..." oninput="searchProducts()"/>
      <div id="searchResults" style="margin-top:10px;"></div>
    </div>
    <div class="panel">
      <div class="panel-title">상품 등록 / 수정</div>
      <input type="hidden" id="editId"/>
      <div class="col">
        <div class="label">상품명 <span style="color:var(--text-hint);">(50자 내외 권고)</span></div>
        <input type="text" id="formName" placeholder="예: 접이식 대용량 비치백 방수 여행가방"/>
        <div id="nameCount" style="font-size:11px;color:var(--text-hint);text-align:right;">0자</div>
      </div>
      <div class="col mt">
        <div class="label">태그 키워드 <span style="color:var(--text-hint);">(쉼표 구분, 20개 이내)</span></div>
        <textarea id="formTags" rows="3" placeholder="예: 비치백,수영가방,해변가방,방수가방..."></textarea>
        <div id="tagCount" style="font-size:11px;color:var(--text-hint);text-align:right;">0개</div>
      </div>
      <div class="col mt">
        <div class="label">사용 여부</div>
        <select id="formActive"><option value="1">사용</option><option value="0">미사용</option></select>
      </div>
      <div class="row mt2" style="justify-content:flex-end;gap:8px;">
        <button class="btn sm" onclick="resetForm()">초기화</button>
        <button class="btn sm primary" onclick="saveProduct()">저장</button>
      </div>
    </div>
  </div>

  <!-- 하단 목록 -->
  <div class="panel" style="grid-column:1/-1;">
    <div class="row" style="justify-content:space-between;margin-bottom:1rem;">
      <div class="panel-title" style="margin-bottom:0;">등록 상품 목록 <span id="prodCount" style="color:var(--text-hint);font-size:11px;font-weight:400;"></span></div>
      <button class="btn sm danger" onclick="exportCSV()">CSV 내보내기</button>
    </div>
    <div style="overflow-x:auto;">
      <table class="prod-table">
        <thead><tr><th style="width:36px;">순번</th><th>상품명</th><th>태그 키워드</th><th style="width:70px;text-align:center;">사용</th><th style="width:80px;text-align:center;">등록일</th><th style="width:80px;"></th></tr></thead>
        <tbody id="prodTableBody"></tbody>
      </table>
      <div id="prodEmpty" class="empty">등록된 상품이 없습니다</div>
    </div>
  </div>
</div>

<script>
let imageBase64='', imageType='', imageUrl='', inputMode='upload';
let extractedKws=[], finalKws=[], finalKwsWithVol=[];
let products=JSON.parse(localStorage.getItem('sourcing_products')||'[]');

function setInputMode(mode) {
  inputMode=mode;
  document.querySelectorAll('.input-tab').forEach((t,i)=>t.classList.toggle('active',(mode==='upload')===(i===0)));
  document.getElementById('modeUpload').style.display=mode==='upload'?'':'none';
  document.getElementById('modeUrl').style.display=mode==='url'?'':'none';
  document.getElementById('urlInput').value='';
  document.getElementById('urlWarn').style.display='none';
  if(mode==='upload'){imageBase64='';imageType='';document.getElementById('uploadContent').textContent='클릭 또는 드래그해서 이미지 업로드';document.getElementById('fileInput').value='';}
}

function onFileSelect(e) {
  const file=e.target.files[0]; if(!file)return;
  imageType=file.type;
  const reader=new FileReader();
  reader.onload=(ev)=>{
    imageBase64=ev.target.result.split(',')[1];
    document.getElementById('uploadContent').innerHTML=`<img src="${ev.target.result}"/><div style="font-size:11px;color:var(--text-sec);margin-top:4px;">${file.name}</div>`;
  };
  reader.readAsDataURL(file);
}

const uploadArea=document.getElementById('uploadArea');
uploadArea.addEventListener('dragover',e=>{e.preventDefault();uploadArea.style.borderColor='var(--accent)';});
uploadArea.addEventListener('dragleave',()=>{uploadArea.style.borderColor='';});
uploadArea.addEventListener('drop',e=>{
  e.preventDefault();uploadArea.style.borderColor='';
  const file=e.dataTransfer.files[0];
  if(file){document.getElementById('fileInput').files=e.dataTransfer.files;onFileSelect({target:{files:[file]}});}
});

function getImageBody() {
  if(inputMode==='url') return {imageUrl: document.getElementById('urlInput').value.trim()};
  return {image:imageBase64, mediaType:imageType};
}

async function step1Analyze() {
  const btn=document.getElementById('btnAnalyze');
  btn.innerHTML='<span class="spinner"></span> 분석 중...'; btn.disabled=true;
  document.getElementById('urlWarn').style.display='none';

  if(inputMode==='upload'&&!imageBase64){alert('이미지를 업로드해주세요');btn.innerHTML='분석 시작';btn.disabled=false;return;}
  if(inputMode==='url'&&!document.getElementById('urlInput').value.trim()){alert('URL을 입력해주세요');btn.innerHTML='분석 시작';btn.disabled=false;return;}

  try {
    const resp=await fetch('/api/analyze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({mode:'analyze',...getImageBody()})});
    const data=await resp.json();
    if(data.error==='url_failed'){
      document.getElementById('urlWarn').innerHTML=`⚠️ URL 이미지 로드 실패. 이미지를 직접 업로드해주세요.`;
      document.getElementById('urlWarn').style.display='';
      btn.innerHTML='분석 시작';btn.disabled=false;return;
    }
    extractedKws=data.keywords||[];
    window._productName = extractedKws.slice(0,2).join(' '); // 상품명 후보
    document.getElementById('step2').style.display='';
    renderKwChips();
    document.getElementById('s1num').className='step-num done';
    document.getElementById('s2num').className='step-num active';
  } catch(e){alert('오류: '+e.message);}
  finally{btn.innerHTML='분석 시작';btn.disabled=false;}
}

function renderKwChips(){
  document.getElementById('kwChips').innerHTML=extractedKws.map((k,i)=>
    `<span class="kw-chip">${k}<button onclick="removeKw(${i})">×</button></span>`
  ).join('');
}
function removeKw(i){extractedKws.splice(i,1);renderKwChips();}
function addKw(){
  const v=document.getElementById('addKwInput').value.trim();if(!v)return;
  extractedKws.push(v);document.getElementById('addKwInput').value='';renderKwChips();
}
document.getElementById('addKwInput').addEventListener('keydown',e=>{if(e.key==='Enter')addKw();});

async function step3Search() {
  if(!extractedKws.length){alert('검색어를 입력해주세요');return;}
  document.getElementById('step3').style.display='';
  document.getElementById('step4').style.display='none';
  document.getElementById('step5').style.display='none';
  document.getElementById('step6').style.display='none';
  document.getElementById('s2num').className='step-num done';
  document.getElementById('s3num').className='step-num active';
  document.getElementById('s3status').innerHTML='<span class="spinner"></span> 네이버 API 조회 중...';
  try {
    const resp=await fetch('/api/keywords',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({keywords:extractedKws})});
    const data=await resp.json();
    const items=(data.keywordList||[]).map(r=>({keyword:r.relKeyword,vol:r.monthlyPcQcCnt+r.monthlyMobileQcCnt})).sort((a,b)=>b.vol-a.vol);
    document.getElementById('s3status').textContent=`${items.length}개 키워드 수집 완료`;
    document.getElementById('s3num').className='step-num done';
    await step4Filter(items);
  } catch(e){document.getElementById('s3status').textContent='오류: '+e.message;}
}

async function step4Filter(candidates) {
  document.getElementById('step4').style.display='';
  document.getElementById('s4num').className='step-num active';
  document.getElementById('s4status').innerHTML='<span class="spinner"></span> 브랜드/상표권/욕설 필터링 중...';
  try {
    const resp=await fetch('/api/analyze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({mode:'filter',keywords:extractedKws,candidates})});
    const data=await resp.json();
    // items 형식 또는 keywords 형식 모두 지원
    if(data.items) {
      finalKwsWithVol=data.items;
      finalKws=data.items.map(i=>i.keyword);
    } else {
      finalKws=data.keywords||[];
      finalKwsWithVol=finalKws.map((k,i)=>({keyword:k,vol:candidates.find(c=>c.keyword===k)?.vol||0}));
    }
    document.getElementById('s4status').textContent=`필터링 완료 → ${finalKws.length}개`;
    document.getElementById('s4num').className='step-num done';
    step5Result(finalKws);
  } catch(e){document.getElementById('s4status').textContent='오류: '+e.message;}
}

function step5Result(kws) {
  document.getElementById('step5').style.display='';
  document.getElementById('kwFinalCount').textContent=`(${kws.length}개)`;
  document.getElementById('finalResult').textContent=kws.join(',');
}

// STEP 6: 다용도 확장 분석
async function step6Expand() {
  document.getElementById('step6').style.display='';
  document.getElementById('step6Result').style.display='none';
  document.getElementById('s6num').className='step-num expand';
  document.getElementById('s6status').innerHTML='<span class="spinner"></span> 다용도 확장 가능성 분석 중...';

  try {
    // 확장 용도 분석
    const expandResp=await fetch('/api/analyze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({mode:'expand',mainKeywords:extractedKws,...getImageBody()})});
    const expandData=await expandResp.json();
    const expanded=expandData.expanded||[];

    if(!expanded.length){
      document.getElementById('s6status').textContent='이 상품은 주 용도 외 확장 용도가 없습니다.';
      document.getElementById('step6Result').style.display='';
      document.getElementById('expandUsages').innerHTML='';
      document.getElementById('expandResult').textContent=finalKws.join(',');
      return;
    }

    document.getElementById('s6status').innerHTML='<span class="spinner"></span> 확장 용도 키워드 네이버 조회 중...';

    // 확장 용도별 네이버 조회
    let allExpandKws=[];
    for(const usage of expanded) {
      try {
        const kwResp=await fetch('/api/keywords',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({keywords:usage.keywords})});
        const kwData=await kwResp.json();
        const candidates=(kwData.keywordList||[]).map(r=>({keyword:r.relKeyword,vol:r.monthlyPcQcCnt+r.monthlyMobileQcCnt})).sort((a,b)=>b.vol-a.vol);

        // 확장 용도 필터링 - items 형식으로 반환
        const filterResp=await fetch('/api/analyze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({mode:'filter_expand',keywords:[usage.usage],candidates})});
        const filterData=await filterResp.json();
        // items 또는 keywords 형식 모두 지원
        if(filterData.items) {
          allExpandKws=allExpandKws.concat(filterData.items);
        } else {
          const kws=filterData.keywords||[];
          allExpandKws=allExpandKws.concat(kws.map(k=>({keyword:k,vol:candidates.find(c=>c.keyword===k)?.vol||0})));
        }
      } catch(e){}
    }

    // 주 용도 + 확장 용도 검색량 기준 합쳐서 20개
    const existingSet=new Set(finalKws);
    // allExpandKws는 {keyword, vol} 형태
    const newKwsWithVol=allExpandKws.filter(k=>!existingSet.has(k.keyword));
    
    // 전체 합치기 (주 용도 + 확장 용도)
    const allCombined=[...finalKwsWithVol, ...newKwsWithVol];
    // 검색량 순 정렬 후 20개
    allCombined.sort((a,b)=>b.vol-a.vol);
    const top20=allCombined.slice(0,20);
    const combined=top20.map(i=>i.keyword);
    const mainSet=new Set(finalKws);

    // 결과 표시
    document.getElementById('s6status').textContent=`확장 용도 ${expanded.length}개 발견 → 검색량 순 ${combined.length}개 완성`;
    // 확장 용도 태그 표시 안 함
    
    // 색상 구분 인라인 텍스트 (확장 키워드만 보라색)
    const spanHtml = combined.map((k,i) => {
      const comma = i < combined.length-1 ? '<span style="color:var(--text);">,</span>' : '';
      if(mainSet.has(k)) return `<span style="color:var(--text);">${k}</span>${comma}`;
      return `<span style="color:#5b21b6;font-weight:500;">${k}</span>${comma}`;
    }).join('');
    document.getElementById('expandResult').innerHTML=spanHtml;
    document.getElementById('expandResult').dataset.raw=combined.join(',');
    document.getElementById('step6Result').style.display='';

  } catch(e){document.getElementById('s6status').textContent='오류: '+e.message;}
}

function copyResult(id){
  const el=document.getElementById(id);
  const txt=el.dataset.raw||el.textContent;
  navigator.clipboard.writeText(txt).then(()=>alert('복사되었습니다'));
}
function applyToForm(id){
  const el=document.getElementById(id);
  document.getElementById('formTags').value=el.dataset.raw||el.textContent;
  updateTagCount();
  // 상품명 자동 완성 (비어있을 때만)
  if(!document.getElementById('formName').value.trim() && window._productName) {
    document.getElementById('formName').value=window._productName;
    updateNameCount();
  }
  document.getElementById('formTags').scrollIntoView({behavior:'smooth'});
}
function resetAll(){
  imageBase64='';imageType='';imageUrl='';extractedKws=[];finalKws=[];
  document.getElementById('uploadContent').textContent='클릭 또는 드래그해서 이미지 업로드';
  document.getElementById('fileInput').value='';
  document.getElementById('urlInput').value='';
  document.getElementById('urlWarn').style.display='none';
  ['step2','step3','step4','step5','step6'].forEach(id=>document.getElementById(id).style.display='none');
  document.getElementById('s1num').className='step-num pending';
}

// 상품 관리
function saveProduct(){
  const name=document.getElementById('formName').value.trim();
  const tags=document.getElementById('formTags').value.trim();
  const active=document.getElementById('formActive').value==='1';
  const editId=document.getElementById('editId').value;
  if(!name){alert('상품명을 입력하세요');return;}
  if(editId){const idx=products.findIndex(p=>p.id===editId);if(idx!==-1)products[idx]={...products[idx],name,tags,active};}
  else products.push({id:Date.now().toString(),name,tags,active,createdAt:new Date().toISOString()});
  persist();resetForm();renderProducts();
}
function resetForm(){
  document.getElementById('editId').value='';document.getElementById('formName').value='';
  document.getElementById('formTags').value='';document.getElementById('formActive').value='1';
  document.getElementById('nameCount').textContent='0자';document.getElementById('tagCount').textContent='0개';
}
function editProduct(id){
  const p=products.find(p=>p.id===id);if(!p)return;
  document.getElementById('editId').value=p.id;document.getElementById('formName').value=p.name;
  document.getElementById('formTags').value=p.tags;document.getElementById('formActive').value=p.active?'1':'0';
  updateNameCount();updateTagCount();document.getElementById('formName').scrollIntoView({behavior:'smooth'});
}
function deleteProduct(id){if(!confirm('삭제하시겠습니까?'))return;products=products.filter(p=>p.id!==id);persist();renderProducts();}
function toggleActive(id){const p=products.find(p=>p.id===id);if(p){p.active=!p.active;persist();renderProducts();}}
function persist(){localStorage.setItem('sourcing_products',JSON.stringify(products));}
function renderProducts(){
  const tbody=document.getElementById('prodTableBody');
  const empty=document.getElementById('prodEmpty');
  document.getElementById('prodCount').textContent=`(${products.length}개)`;
  if(!products.length){tbody.innerHTML='';empty.style.display='';return;}
  empty.style.display='none';
  tbody.innerHTML=products.map((p,i)=>{
    const tagArr=p.tags?p.tags.split(',').map(t=>t.trim()).filter(Boolean):[];
    const tagHtml=tagArr.slice(0,8).map(t=>`<span class="tag">${t}</span>`).join(' ')+(tagArr.length>8?` <span style="font-size:10px;color:var(--text-hint);">+${tagArr.length-8}</span>`:'');
    return `<tr><td style="color:var(--text-hint);font-size:11px;">${i+1}</td><td style="font-weight:500;min-width:140px;">${p.name}</td><td>${tagHtml}</td><td style="text-align:center;"><span class="${p.active?'badge-on':'badge-off'}" onclick="toggleActive('${p.id}')">${p.active?'사용':'미사용'}</span></td><td style="text-align:center;font-size:11px;color:var(--text-sec);">${p.createdAt?p.createdAt.slice(0,10):'-'}</td><td><div class="row" style="gap:4px;justify-content:flex-end;"><button class="btn sm" onclick="editProduct('${p.id}')">수정</button><button class="btn sm danger" onclick="deleteProduct('${p.id}')">삭제</button></div></td></tr>`;
  }).join('');
}
function searchProducts(){
  const q=document.getElementById('searchInput').value.trim().toLowerCase();
  const wrap=document.getElementById('searchResults');
  if(!q){wrap.innerHTML='';return;}
  const results=products.filter(p=>p.name.toLowerCase().includes(q)||(p.tags&&p.tags.toLowerCase().includes(q)));
  if(!results.length){wrap.innerHTML='<div style="font-size:12px;color:var(--text-hint);padding:6px 0;">검색 결과 없음</div>';return;}
  wrap.innerHTML=results.slice(0,5).map(p=>`<div class="search-item" onclick="applyFromSearch('${p.id}')"><div class="name">${p.name}</div><div class="tags">${p.tags||'-'}</div></div>`).join('');
}
function applyFromSearch(id){
  const p=products.find(p=>p.id===id);if(!p)return;
  document.getElementById('formName').value=p.name;document.getElementById('formTags').value=p.tags;
  document.getElementById('editId').value='';document.getElementById('searchInput').value='';
  document.getElementById('searchResults').innerHTML='';updateNameCount();updateTagCount();
  document.getElementById('formName').scrollIntoView({behavior:'smooth'});
}
function updateNameCount(){
  const v=document.getElementById('formName').value;const el=document.getElementById('nameCount');
  el.textContent=`${v.length}자`;el.style.color=v.length>100?'#991b1b':v.length>50?'#92400e':'var(--text-hint)';
}
function updateTagCount(){
  const v=document.getElementById('formTags').value;
  const cnt=v.split(',').map(t=>t.trim()).filter(Boolean).length;
  const el=document.getElementById('tagCount');
  el.textContent=`${cnt}개`;el.style.color=cnt>20?'#991b1b':'var(--text-hint)';
}
document.getElementById('formName').addEventListener('input',updateNameCount);
document.getElementById('formTags').addEventListener('input',updateTagCount);
function exportCSV(){
  if(!products.length){alert('데이터가 없습니다');return;}
  const rows=[['순번','상품명','태그키워드','사용여부','등록일']];
  products.forEach((p,i)=>rows.push([i+1,p.name,p.tags,p.active?'사용':'미사용',p.createdAt?.slice(0,10)||'']));
  const csv=rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'}));
  a.download=`소싱키워드_${new Date().toISOString().slice(0,10)}.csv`;a.click();
}
renderProducts();
</script>
