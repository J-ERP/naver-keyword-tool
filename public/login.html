<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>소싱 키워드 관리 도구 - 로그인</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,'Pretendard',sans-serif;background:#f5f5f3;min-height:100vh;display:flex;align-items:center;justify-content:center;}
.card{background:#fff;border:0.5px solid rgba(0,0,0,0.1);border-radius:12px;padding:2rem;width:100%;max-width:360px;box-shadow:0 4px 24px rgba(0,0,0,0.06);}
h1{font-size:18px;font-weight:700;margin-bottom:4px;color:#1a1a1a;}
.sub{font-size:12px;color:#888;margin-bottom:1.5rem;}
.label{font-size:12px;color:#555;font-weight:500;margin-bottom:5px;display:block;}
input{width:100%;height:40px;padding:0 12px;border:0.5px solid rgba(0,0,0,0.2);border-radius:8px;font-size:14px;color:#1a1a1a;background:#fafafa;outline:none;margin-bottom:12px;}
input:focus{border-color:#1a1a1a;background:#fff;}
button{width:100%;height:42px;background:#1a1a1a;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;margin-top:4px;}
button:hover{opacity:.85;}
.error{font-size:12px;color:#991b1b;background:#fee2e2;padding:8px 12px;border-radius:6px;margin-top:10px;display:none;}
</style>
</head>
<body>
<div class="card">
  <h1>소싱 키워드 관리 도구</h1>
  <div class="sub">계속하려면 로그인하세요</div>
  <label class="label">아이디</label>
  <input type="text" id="username" placeholder="아이디 입력" autocomplete="username"/>
  <label class="label">비밀번호</label>
  <input type="password" id="password" placeholder="비밀번호 입력" autocomplete="current-password"/>
  <button onclick="login()" id="btnLogin">로그인</button>
  <div class="error" id="errMsg"></div>
</div>
<script>
// 이미 로그인된 경우 메인으로
if (sessionStorage.getItem('auth_token')) location.href = '/';

async function login() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value.trim();
  const btn = document.getElementById('btnLogin');
  const err = document.getElementById('errMsg');

  if (!username || !password) { showErr('아이디와 비밀번호를 입력하세요.'); return; }

  btn.textContent = '로그인 중...'; btn.disabled = true;
  err.style.display = 'none';

  try {
    const resp = await fetch('/api/auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const data = await resp.json();
    if (!resp.ok) { showErr(data.error || '로그인 실패'); return; }
    sessionStorage.setItem('auth_token', data.token);
    sessionStorage.setItem('auth_user', data.username);
    location.href = '/';
  } catch(e) {
    showErr('서버 오류가 발생했습니다.');
  } finally {
    btn.textContent = '로그인'; btn.disabled = false;
  }
}

function showErr(msg) {
  const err = document.getElementById('errMsg');
  err.textContent = msg; err.style.display = '';
}

// 엔터키 로그인
document.addEventListener('keydown', e => { if(e.key === 'Enter') login(); });
</script>
</body>
</html>
